# qmenu configuration — copy to ~/.config/qmenu/config.toml and edit.
#
# Every key is optional; anything omitted keeps its built-in default (shown
# below). Colours accept "#rgb", "#rrggbb", or "#aarrggbb" (alpha first).

[colors]
background           = "#f21e1e2e"  # bar background (alpha gives translucency)
foreground           = "#cdd6f4"    # item / typed-query text
prompt               = "#89b4fa"    # (reserved accent)
selection_background = "#89b4fa"    # highlight behind the selected row
selection_foreground = "#11111b"    # selected row text
muted                = "#9399b2"    # placeholder text
border               = "#89b4fa"    # outline

[layout]
anchor            = "center" # "center" (middle of screen) or "top"
width_fraction    = 0.45    # bar width as a fraction of the output width
min_width         = 480     # ...but never narrower than this (px)
margin_top        = 8       # gap below the top edge (px); only used when anchor="top"
max_visible_items = 12      # rows shown before scrolling
font_size         = 15.0
line_height       = 30.0    # row height (px)
pad_x             = 14.0    # inner horizontal padding (px)
pad_y             = 10.0    # inner vertical padding (px)
corner_radius     = 14.0    # rounded-corner radius (px); 0 = square
border_width      = 2.0     # outline thickness (px); 0 = no border
row_radius        = 8.0     # selection highlight corner radius (px)
result_gap        = 8.0     # gap between the prompt drawer and the results panel (px)
# font_family     = "Inter" # omit to use the system default sans

[icons]
enabled = true    # show application icons (drun mode)
size    = 20      # icon square size (px)
gap     = 10.0    # space between icon and label (px)
# theme = "Adwaita"  # preferred icon theme; falls back to hicolor

[behavior]
show_all_when_empty = false      # false: show nothing until you type
placeholder         = "Search…"  # prompt text shown while the query is empty
terminal            = "xterm"    # used to wrap Terminal=true .desktop entries
                                 # (overridden by $QMENU_TERMINAL / $TERMINAL)
animate             = true       # animate the results drawer growing/shrinking
animation_ms        = 55.0       # drawer easing time constant (smaller = snappier)
